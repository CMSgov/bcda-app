name: FHIR Scan

on:
  pull_request:
    paths:
      - .github/workflows/fhirscan.yml
  workflow_dispatch:

jobs:
  fhirscan:
    permissions:
      contents: read
      id-token: write
    name: run fhir scan
    runs-on: codebuild-bcda-app-non-prod-${{github.run_id}}-${{github.run_attempt}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.NON_PROD_ACCOUNT_ID }}:role/delegatedadmin/developer/bcda-dev-github-actions
      - name: Get client credentials
        uses: cmsgov/cdap/actions/aws-params-env-action@main
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        with:
          params: |
            CLIENT_CREDENTIALS_PARAMS=/bcda/dev/sensitive/dev_client_credentials
      - name: Run Inferno
        id: run
        run: |
          cd ${GITHUB_WORKSPACE}

          docker build -t inferno:1 https://github.com/inferno-framework/bulk-data-test-kit.git#5bd61db090c5911792f33e12dca6981d7e22f9a0
          docker compose -f fhir_testing/compose.inferno.yml run inferno bundle exec inferno migrate
          docker compose -f fhir_testing/compose.inferno.yml up -d
          sleep 20
          docker stop fhir_testing-hl7_validator_service-1

          TEST={"foo":"bar"} | jq -r '.foo // empty'
          echo $TEST
          CLIENT_ID=$(echo "$CLIENT_CREDENTIALS_PARAMS" | jq -r '.client_id // empty')
          CLIENT_SECRET=$(echo "$CLIENT_CREDENTIALS_PARAMS" | jq -r '.client_secret // empty')
          # Validate parsed values
          if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ]; then
            echo "ERROR: client_id or client_secret is null/empty in CLIENT_CREDENTIALS_PARAMS"
            exit 1
          fi
          

          docker build --no-cache -t fhir_testing -f docker/Dockerfile.fhir_testing .
          docker run --add-host=host.docker.internal:host-gateway --rm -e BULK_URL="https://dev.bcda.cms.gov/api/v2/" -e CLIENT_ID="$CLIENT_ID" -e CLIENT_SECRET="$CLIENT_SECRET" -e TOKEN_URL="https://dev.bcda.cms.gov/auth/token" fhir_testing
