name: Build and publish Worker

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref of bcda-app to checkout (tag, branch name, or full SHA)'
        required: true
        type: string
  workflow_call:
    inputs:
      ref:
        description: 'Ref of bcda-app to checkout (tag, branch name, or full SHA)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build_and_publish:
    strategy:
      matrix:
        vars:
          - env: non-prod
            account_id: NON_PROD_ACCOUNT_ID
            role: dev
          - env: prod
            account_id: PROD_ACCOUNT_ID
            role: prod
    runs-on: codebuild-bcda-app${{ contains(fromJSON('["dev"]'), matrix.env) && '-non-prod' || ''}}-${{github.run_id}}-${{github.run_attempt}} 
    steps:
      - name: Get Workflow Inputs
        run: echo "${{ toJSON(inputs) }}"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets[matrix.vars.account_id] }}:role/delegatedadmin/developer/bcda-${{ matrix.vars.role }}-github-actions
      - name: Checkout BCDA
        uses: actions/checkout@v4
        with:
          repository: CMSgov/bcda-app
          ref: ${{ inputs.ref }}
      - name: Set Version
        id: version
        run: |
          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "undefined")
          if [[ "$TAG" != "undefined" ]]; then
            echo "Ref is a tag; setting version to tag name"
            echo "version=$TAG" >> $GITHUB_OUTPUT
          else
            echo "Ref is not a tag; setting version to revision shorthand"
            REV_SHORT=$(git rev-parse --short=8 HEAD)
            echo "version=temp-$REV_SHORT" >> $GITHUB_OUTPUT
          fi
      - name: Set ECR urls
        run: |
          echo "ECR_URL=${{ secrets[matrix.vars.account_id] }}.dkr.ecr.us-east-1.amazonaws.com/bcda-worker" >> $GITHUB_ENV
      - name: Build Worker
        run: |
          docker build \
            --platform linux/arm64 \
            --build-arg RELEASE_VERSION=${{ steps.version.outputs.version }} \
            -t ${{ env.ECR_URL }}:${{ steps.version.outputs.version }} \
            -f Dockerfiles/Dockerfile.bcdaworker .
      - name: Push to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin '${{ env.ECR_URL }}'
          docker image push ${{ env.ECR_URL }}:${{ steps.version.outputs.version }}
