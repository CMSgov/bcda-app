# Integration test that triggers an Opt Out import in the test environment and
# verifies the imported data in the test database.
name: opt-out-import prod integration GF

on:
  push:
    branches: [verify-lambdas]
  pull_request:
    paths:
      - .github/workflows/opt-out-import-integration-prod-GF.yml
      - .github/workflows/opt-out-import-prod-deploy-GF.yml
      - optout/**
      - bcda/suppression/**
      - bcda/lambda/optout/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Ensure we have only one integration prod running at a time
concurrency:
  group: opt-out-import-prod-integration

jobs:
  # Deploy first if triggered by pull_request
  deploy:
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/opt-out-import-deploy-GF.yml
    secrets: inherit
    with:
      deploy_env: prod

  trigger:
    if: ${{ always() }}
    needs: deploy
    runs-on: codebuild-bcda-app-${{github.run_id}}-${{github.run_attempt}}
    defaults:
      run:
        working-directory: ./optout
    outputs:
      filename: ${{ steps.createfile.outputs.FILENAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.PROD_ACCOUNT_ID }}:role/delegatedadmin/developer/bcda-prod-opt-out-export-function
      - name: Get BFD Account
        uses: cmsgov/ab2d-bcda-dpc-platform/actions/aws-params-env-action@main
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        with:
          params: | 
            BFD_ACCOUNT_ID=/bfd/account-id
      
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          # Note that we use the BFD role with access to the bucket
          role-to-assume: arn:aws:iam::${{ env.BFD_ACCOUNT_ID }}:role/delegatedadmin/developer/bfd-prod-eft-bcda-ct-bucket-role
          role-chaining: true
          role-skip-session-tagging: true
      - name: Upload prod file to the BFD bucket to trigger lambda function via SNS message
        id: createfile
        run: |
          fname=T\#EFT.ON.ACO.NGD1800.DPRF.D$(date +'%y%m%d').T$(date +'%H%M%S')1
          echo "FILENAME=$fname" >> "$GITHUB_OUTPUT"
          aws s3 cp ../shared_files/synthetic1800MedicareFiles/prod/T\#EFT.ON.ACO.NGD1800.DPRF.D181120.T1000009 \
            s3://bfd-prod-eft/bfdeft01/bcda/in/prod/$fname

  verify:
    needs: trigger
    runs-on: codebuild-bcda-app-${{github.run_id}}-${{github.run_attempt}}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
    steps:
      - uses: actions/checkout@v3
      - uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{  secrets.PROD_ACCOUNT_ID }}:role/delegatedadmin/developer/bcda-prod-github-actions 
      - name: Install psql
        run: |
          sudo dnf -y update
          sudo dnf install postgresql16 -y
      - name: Get database credentials
        uses: cmsgov/ab2d-bcda-dpc-platform/actions/aws-params-env-action@main
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}

        with:
          params: |
            CONNECTION_INFO=/bcda/prod/api/DATABASE_URL
      - name: Verify suppression file was ingested
        env:
          FILENAME: ${{needs.trigger.outputs.filename}}
        # CAUTION: if changing the script below, validate that sensitive information is not printed in the workflow
        run: |
          HOST=$(aws rds describe-db-instances --db-instance-identifier bcda-prod 2>&1 | jq -r '.DBInstances[0].Endpoint.Address' 2>&1)
          CONNECTION_URL=$(echo $CONNECTION_INFO 2>&1 | sed -E "s/@.*\/bcda/\@$HOST\/bcda/" 2>&1)
          SUPPRESSION_FILE=`psql -t "$CONNECTION_URL" -c "SELECT id FROM suppression_files WHERE name = '$FILENAME' LIMIT 1" 2>&1`
          if [[ $? -ne 0 || -z $SUPPRESSION_FILE ]]; then
            echo "suppression_file query returned zero results or command failed"
            exit 1
          else
            SUPPRESSIONS=`psql -t "$CONNECTION_URL" -c "SELECT count(mbi) FROM suppressions WHERE file_id = $SUPPRESSION_FILE" 2>&1`
              if [[ $? -ne 0 || -z $SUPPRESSIONS ]]; then
                echo "suppressions query returned zero results or command failed"
                exit 1
              fi
          fi

